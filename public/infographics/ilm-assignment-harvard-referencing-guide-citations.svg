<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" role="img" aria-labelledby="ilm-harvard-title">
  <title id="ilm-harvard-title">ILM Assignment Harvard Referencing Guide: in-text citation formats, reference list format by source type, 40 most-cited management theories, common errors, paraphrase vs quotation</title>

  <!-- Background -->
  <rect width="800" height="520" fill="#F4F7FB" rx="14"/>
  <!-- Header -->
  <rect width="800" height="64" fill="#14532D" rx="14"/>
  <rect y="50" width="800" height="14" fill="#14532D"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">ILM Assignment Harvard Referencing: Citations and Reference List</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#86EFAC">In-text formats · Reference list structure · 40 key theories · Common errors · Paraphrase vs quotation</text>

  <!-- Rule strip -->
  <rect x="28" y="80" width="744" height="22" rx="4" fill="#EAB308"/>
  <text x="400" y="95" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1C1917">Rule: every in-text citation → reference list entry · every reference list entry → in-text citation · missing either = academic standards failure</text>

  <!-- In-text formats panel -->
  <rect x="28" y="112" width="360" height="258" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="28" y="112" width="360" height="24" rx="6" fill="#14532D"/>
  <rect x="28" y="124" width="360" height="12" fill="#14532D"/>
  <text x="208" y="128" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">IN-TEXT CITATION FORMATS</text>
  <text x="40" y="148" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Paraphrase (no exact wording):</text>
  <text x="40" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">(Bass, 1985) at end · or: Bass (1985) argues that...</text>
  <line x1="40" y1="168" x2="378" y2="168" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="182" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Direct quotation (exact wording):</text>
  <text x="40" y="194" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">(Kotter, 1996: 21) — page number REQUIRED</text>
  <text x="40" y="206" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Enclose in quotation marks "..." always</text>
  <line x1="40" y1="214" x2="378" y2="214" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="228" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Multiple authors:</text>
  <text x="40" y="240" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">2 authors: (Hersey and Blanchard, 1969)</text>
  <text x="40" y="252" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">3+: (Uhl-Bien et al., 2007)</text>
  <line x1="40" y1="260" x2="378" y2="260" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="274" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Multiple sources in one bracket:</text>
  <text x="40" y="286" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">(Bass, 1985; Hersey and Blanchard, 1969) — alphabetical</text>
  <line x1="40" y1="294" x2="378" y2="294" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Reference list formats:</text>
  <text x="40" y="320" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Book: Surname, I. (Year). <tspan font-style="italic">Title in italics</tspan>. Place: Publisher.</text>
  <text x="40" y="332" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Journal: Surname, I. (Year). Article title. <tspan font-style="italic">Journal</tspan>, V(I), pp. x–y.</text>
  <text x="40" y="344" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Website: Org. (Year). <tspan font-style="italic">Page title</tspan>. [Online]. Available: URL [Date]</text>
  <line x1="40" y1="352" x2="378" y2="352" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="366" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" font-weight="700" fill="#DC2626">Do NOT use ibid/op.cit — Harvard uses full author-date each time</text>

  <!-- Key citations panel -->
  <rect x="402" y="112" width="370" height="258" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="402" y="112" width="370" height="24" rx="6" fill="#1E40AF"/>
  <rect x="402" y="124" width="370" height="12" fill="#1E40AF"/>
  <text x="587" y="128" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">KEY CORRECTLY FORMATTED CITATIONS</text>
  <text x="414" y="148" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Gibbs, G. (1988). <tspan font-style="italic">Learning by Doing</tspan>. Oxford: FEU.</text>
  <text x="414" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Kolb, D.A. (1984). <tspan font-style="italic">Experiential Learning</tspan>. NJ: Prentice-Hall.</text>
  <text x="414" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Schön, D.A. (1983). <tspan font-style="italic">The Reflective Practitioner</tspan>. NY: Basic Books.</text>
  <text x="414" y="184" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Bass, B.M. (1985). <tspan font-style="italic">Leadership and Performance Beyond Expectations</tspan>. NY: Free Press.</text>
  <text x="414" y="196" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Hersey, P. and Blanchard, K.H. (1969). <tspan font-style="italic">Management of Organizational Behavior</tspan>. NJ: PH.</text>
  <text x="414" y="208" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Kotter, J.P. (1996). <tspan font-style="italic">Leading Change</tspan>. Boston: HBSP.</text>
  <text x="414" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Maslow, A.H. (1943). A theory of human motivation. <tspan font-style="italic">Psychological Review</tspan>, 50(4), pp. 370–396.</text>
  <text x="414" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Herzberg, F. (1959). <tspan font-style="italic">The Motivation to Work</tspan>. NY: Wiley.</text>
  <text x="414" y="244" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Goleman, D. (2000). Leadership that gets results. <tspan font-style="italic">HBR</tspan>, 78(2), pp. 78–90.</text>
  <text x="414" y="256" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Tuckman, B.W. (1965). Developmental sequence. <tspan font-style="italic">Psych Bulletin</tspan>, 63(6), pp. 384–399.</text>
  <text x="414" y="268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Porter, M.E. (1980). <tspan font-style="italic">Competitive Strategy</tspan>. NY: Free Press.</text>
  <text x="414" y="280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Senge, P.M. (1990). <tspan font-style="italic">The Fifth Discipline</tspan>. NY: Doubleday.</text>
  <text x="414" y="292" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Gronn, P. (2002). Distributed leadership. <tspan font-style="italic">Leadership Quarterly</tspan>, 13(4), pp. 423–451.</text>
  <text x="414" y="304" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Uhl-Bien, M. et al. (2007). Complexity leadership. <tspan font-style="italic">Leadership Quarterly</tspan>, 18(4), pp. 298–318.</text>
  <text x="414" y="316" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Kaplan, R.S. and Norton, D.P. (1996). <tspan font-style="italic">The Balanced Scorecard</tspan>. Boston: HBSP.</text>
  <text x="414" y="328" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Ansoff, I. (1957). Strategies for diversification. <tspan font-style="italic">HBR</tspan>, 35(5), pp. 113–124.</text>
  <line x1="414" y1="336" x2="762" y2="336" stroke="#E5E7EB" stroke-width="1"/>
  <text x="414" y="350" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" font-weight="700" fill="#374151">Journal article rule: volume(issue) + pp. required</text>
  <text x="414" y="362" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">HBR = practitioner source · L7: add peer-reviewed journals</text>

  <!-- Common errors strip -->
  <rect x="28" y="382" width="744" height="30" rx="4" fill="#DC2626"/>
  <text x="400" y="397" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">6 MOST COMMON ERRORS IN ILM HARVARD REFERENCING</text>
  <text x="400" y="410" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#FEE2E2">No page number on quotation · Missing vol/issue on journals · Italics on article title not journal · In-text without ref list entry · Using ibid · Inconsistent format same source</text>

  <!-- Paraphrase strip -->
  <rect x="28" y="424" width="744" height="56" rx="6" fill="#14532D"/>
  <text x="400" y="440" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">PARAPHRASE vs QUOTATION — Management Assignments</text>
  <text x="44" y="455" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#86EFAC">PREFER paraphrase: demonstrates understanding · integrates smoothly · lower Turnitin similarity · no page number required</text>
  <text x="44" y="469" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#FDE68A">USE quotation when: exact wording is technically significant · defining a criterion · key claim whose precise formulation matters · always follow with YOUR analytical commentary</text>

  <!-- Footer -->
  <text x="400" y="513" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#9CA3AF">ILM Assignment Help Service · Harvard Referencing Guide for ILM Students</text>
</svg>
