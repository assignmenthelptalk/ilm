<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="100%" role="img" aria-labelledby="ilm-level5-title">
  <title id="ilm-level5-title">ILM Level 5 Assignment Units: Leading Innovation Change Kotter 8 Step Lewin Force Field ADKAR, Becoming Effective Leader 360 Degree Feedback Bass Transformational, Financial Management Variance Analysis, Projects Mendelow Matrix, Harvard Referencing Criterion Mapping</title>

  <!-- Background -->
  <rect width="800" height="640" fill="#F4F7FB" rx="14"/>
  <!-- Header -->
  <rect width="800" height="64" fill="#1B3A6B" rx="14"/>
  <rect y="50" width="800" height="14" fill="#1B3A6B"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">ILM Level 5: Middle Manager Unit Framework</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#A8C4E0">Most-Searched ILM Level · Middle Managers · Employer-Sponsored · Harvard Referencing Required · 2,000–3,500 words per unit</text>

  <!-- Criterion rule -->
  <rect x="28" y="82" width="744" height="22" rx="4" fill="#DC2626"/>
  <text x="400" y="97" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Criterion mapping before submission: annotate every paragraph against the unit specification criterion it evidences — missing one = Referral</text>

  <!-- 5 units header -->
  <rect x="28" y="118" width="744" height="20" rx="4" fill="#2563EB"/>
  <text x="400" y="132" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">5 CORE UNITS — Change Models · Leadership Theory · Financial Analysis · Project Management · Marketing Strategy</text>

  <!-- Leading Innovation -->
  <rect x="28" y="146" width="226" height="200" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="28" y="146" width="226" height="22" rx="6" fill="#1B3A6B"/>
  <rect x="28" y="157" width="226" height="11" fill="#1B3A6B"/>
  <text x="141" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#FFFFFF">LEADING INNOVATION &amp; CHANGE</text>
  <text x="40" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Kotter (1996) 8-step:</text>
  <text x="40" y="193" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">1 Urgency · 2 Coalition · 3 Vision</text>
  <text x="40" y="205" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">4 Enlist · 5 Remove barriers · 6 Wins</text>
  <text x="40" y="217" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">7 Sustain · 8 Anchor change</text>
  <line x1="40" y1="224" x2="244" y2="224" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="236" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Lewin: Force Field Analysis</text>
  <text x="40" y="248" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Driving forces vs restraining forces</text>
  <text x="40" y="260" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Unfreeze → Move → Refreeze</text>
  <line x1="40" y1="267" x2="244" y2="267" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">ADKAR: individual-level change</text>
  <text x="40" y="291" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Awareness · Desire · Knowledge</text>
  <text x="40" y="303" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Ability · Reinforcement</text>
  <text x="40" y="317" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" font-weight="700" fill="#DC2626">Distinction: evaluate which Kotter steps failed</text>
  <text x="40" y="329" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">WHY Step 1 or 3 was problematic — not just what</text>
  <text x="40" y="340" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7" fill="#374151">Evidence: real organisational change managed</text>

  <!-- Becoming Effective Leader -->
  <rect x="268" y="146" width="226" height="200" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="268" y="146" width="226" height="22" rx="6" fill="#2563EB"/>
  <rect x="268" y="157" width="226" height="11" fill="#2563EB"/>
  <text x="381" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#FFFFFF">BECOMING AN EFFECTIVE LEADER</text>
  <text x="280" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">360° Feedback: self + line mgr + peers + reports</text>
  <text x="280" y="193" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Distinction: pattern analysis across rater groups</text>
  <text x="280" y="205" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Gap: self vs subordinates → what explains it?</text>
  <line x1="280" y1="212" x2="484" y2="212" stroke="#E5E7EB" stroke-width="1"/>
  <text x="280" y="224" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Bass (1985) Transformational:</text>
  <text x="280" y="236" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Idealised Influence · Inspirational Motivation</text>
  <text x="280" y="248" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Intellectual Stimulation · Individualised Consideration</text>
  <line x1="280" y1="255" x2="484" y2="255" stroke="#E5E7EB" stroke-width="1"/>
  <text x="280" y="267" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Hersey &amp; Blanchard (Level 5 depth):</text>
  <text x="280" y="279" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Matching S1–S4 to R1–R4 per team member</text>
  <text x="280" y="291" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Distinction: are you adapting or defaulting?</text>
  <line x1="280" y1="298" x2="484" y2="298" stroke="#E5E7EB" stroke-width="1"/>
  <text x="280" y="310" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Development plan — Distinction standard:</text>
  <text x="280" y="322" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">SMART objectives + specific activities</text>
  <text x="280" y="334" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Success measures + timeline</text>
  <text x="280" y="340" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7" fill="#374151">"Attend a course" is NOT Distinction standard</text>

  <!-- Financial Management -->
  <rect x="508" y="146" width="264" height="200" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="508" y="146" width="264" height="22" rx="6" fill="#7C3AED"/>
  <rect x="508" y="157" width="264" height="11" fill="#7C3AED"/>
  <text x="640" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#FFFFFF">FINANCIAL MANAGEMENT + PROJECTS</text>
  <text x="520" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">P&amp;L: Revenue → Gross Profit → EBITDA → Operating Profit</text>
  <text x="520" y="193" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Variance: Favourable (better) · Adverse (worse than budget)</text>
  <text x="520" y="205" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Distinction: causal analysis — WHY the variance, not just what</text>
  <text x="520" y="217" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">EBITDA: evaluate what it reveals AND what it masks</text>
  <line x1="520" y1="224" x2="762" y2="224" stroke="#E5E7EB" stroke-width="1"/>
  <text x="520" y="236" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Managing Workplace Projects:</text>
  <text x="520" y="248" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Mendelow matrix: high/low power × high/low interest</text>
  <text x="520" y="260" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">→ Manage closely · Keep satisfied · Inform · Monitor</text>
  <text x="520" y="272" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Risk register: description · probability · impact</text>
  <text x="520" y="284" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Mitigation · residual risk · risk owner</text>
  <text x="520" y="296" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">WBS: decompose deliverables → tasks → allocation</text>
  <text x="520" y="310" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" font-weight="700" fill="#DC2626">Distinction: evaluate stakeholder mgmt effectiveness</text>
  <text x="520" y="322" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Were any high-power stakeholders underestimated?</text>
  <text x="520" y="334" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7" fill="#374151">Evidence: real project or real budget responsibility</text>
  <text x="520" y="340" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7" fill="#374151">No hypothetical financial scenarios</text>

  <!-- Harvard referencing -->
  <rect x="28" y="360" width="744" height="100" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="44" y="378" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#1D4ED8">HARVARD REFERENCING — Required at Level 5 · Key Management Theory Citations</text>
  <text x="44" y="394" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Kotter, J.P. (1996). <tspan font-style="italic">Leading Change</tspan>. Harvard Business School Press · Hersey, P. and Blanchard, K.H. (1969). <tspan font-style="italic">Management of Organizational Behavior</tspan>. Prentice Hall</text>
  <text x="44" y="409" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Bass, B.M. (1985). <tspan font-style="italic">Leadership and Performance Beyond Expectations</tspan>. Free Press · Lewin, K. (1951). <tspan font-style="italic">Field Theory in Social Science</tspan>. Harper &amp; Row</text>
  <text x="44" y="424" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Gibbs, G. (1988). <tspan font-style="italic">Learning by Doing</tspan>. FEU · Kolb, D.A. (1984). <tspan font-style="italic">Experiential Learning</tspan>. Prentice-Hall</text>
  <text x="44" y="439" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">In-text: (Author, Year) · Quote: (Author, Year: page) · Level 5: management journals (HBR, Management Today) appropriate · Level 7: peer-reviewed journals REQUIRED</text>
  <text x="44" y="453" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#D97706">Criterion mapping + Harvard referencing = the two cross-unit requirements that apply to ALL Level 5 units</text>

  <!-- Level 5 vs Level 7 strip -->
  <rect x="28" y="474" width="744" height="42" rx="6" fill="#1B3A6B"/>
  <text x="400" y="490" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">LEVEL 5 DISTINCTION STANDARD: analytically critical (limitations) + theory-connected (model cited and evaluated) + forward-looking (SMART development plan)</text>
  <text x="400" y="505" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#A8C4E0">Kotter applied as a description template = Pass · Kotter applied with evaluation of which steps failed and WHY + alternative change approach compared = Distinction</text>

  <!-- Footer -->
  <text x="400" y="630" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#9CA3AF">ILM Assignment Help Service · ILM Level 5 Middle Manager Unit Framework</text>
</svg>
