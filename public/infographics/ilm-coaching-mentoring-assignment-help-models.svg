<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="100%" role="img" aria-labelledby="ilm-coaching-title">
  <title id="ilm-coaching-title">ILM Coaching Mentoring Models: GROW Goal Reality Options Will Whitmore Limitations, OSCAR Outcome Situation McLeod, CLEAR Contracting Listening Hawkins, TGROW CIGAR, Coaching vs Mentoring Non-Directive Distinction, Session Logs Coaching Philosophy EMCC ICF Level 3 5 7</title>

  <!-- Background -->
  <rect width="800" height="640" fill="#F4F7FB" rx="14"/>
  <!-- Header -->
  <rect width="800" height="64" fill="#1B3A6B" rx="14"/>
  <rect y="50" width="800" height="14" fill="#1B3A6B"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">ILM Coaching and Mentoring: Models, Evidence, and Level Standards</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#A8C4E0">Level 3 · Level 5 · Level 7 · Work-Based Evidence · Non-Directive Coaching Requirement · EMCC · ICF</text>

  <!-- Coaching vs mentoring banner -->
  <rect x="28" y="82" width="744" height="26" rx="6" fill="#DC2626"/>
  <text x="400" y="96" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">COACHING vs MENTORING: Coaching = non-directive, coachee generates own solutions · Mentoring = advisory, mentor shares expertise and gives advice</text>
  <text x="400" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#FECACA">Session logs describing advice-giving = evidencing mentoring NOT coaching = Referral · Fundamental distinction assessed in ALL ILM coaching units at all levels</text>

  <!-- Models header -->
  <rect x="28" y="122" width="744" height="20" rx="4" fill="#2563EB"/>
  <text x="400" y="136" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">COACHING MODELS — Components, Applications, Limitations, and Comparative Evaluation</text>

  <!-- GROW -->
  <rect x="28" y="150" width="232" height="208" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="28" y="150" width="232" height="22" rx="6" fill="#1B3A6B"/>
  <rect x="28" y="162" width="232" height="10" fill="#1B3A6B"/>
  <text x="144" y="167" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">GROW — Whitmore (2002)</text>
  <text x="40" y="185" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Goal: SMART + motivating + session goal</text>
  <text x="40" y="198" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">"What do you want to achieve today?"</text>
  <text x="40" y="211" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Reality: current state, obstacles, resources</text>
  <text x="40" y="224" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">"What's happening right now?" (spend most time here)</text>
  <text x="40" y="237" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Options: brainstorm — no evaluation yet</text>
  <text x="40" y="250" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">"What else could you do?" "No constraints?"</text>
  <text x="40" y="263" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Will: specific action + accountability</text>
  <text x="40" y="276" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">"Scale 1-10 commitment?" "What could block you?"</text>
  <line x1="40" y1="283" x2="250" y2="283" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="295" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#DC2626">GROW LIMITATIONS — Distinction criteria:</text>
  <text x="40" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Designed for performance coaching</text>
  <text x="40" y="321" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Linear → premature solution focus (Options/Will)</text>
  <text x="40" y="334" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Not suited to identity/values/systemic issues</text>
  <text x="40" y="347" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Use CLEAR or OSCAR for complex exec coaching</text>
  <text x="40" y="352" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7" fill="#374151">TGROW: Topic added before Goal — unfocused coachees</text>

  <!-- OSCAR + CLEAR -->
  <rect x="276" y="150" width="248" height="208" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="276" y="150" width="248" height="22" rx="6" fill="#2563EB"/>
  <rect x="276" y="162" width="248" height="10" fill="#2563EB"/>
  <text x="400" y="167" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">OSCAR + CLEAR</text>
  <text x="288" y="185" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">OSCAR (McLeod, 2003):</text>
  <text x="288" y="198" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Outcome · Situation (before goal) · Choices</text>
  <text x="288" y="211" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Actions · Review</text>
  <text x="288" y="224" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Use when: complex/systemic issue, unclear goal</text>
  <text x="288" y="237" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Situation explored BEFORE outcome set</text>
  <line x1="288" y1="244" x2="514" y2="244" stroke="#E5E7EB" stroke-width="1"/>
  <text x="288" y="257" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">CLEAR (Hawkins &amp; Smith, 2006):</text>
  <text x="288" y="270" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Contracting: relationship purpose + boundaries</text>
  <text x="288" y="283" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Listening: coaching presence — not just listening</text>
  <text x="288" y="296" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Exploring: widen perspective · challenge assumptions</text>
  <text x="288" y="309" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Action · Review (process + learning)</text>
  <text x="288" y="322" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Most relational model — coaching relationship = tool</text>
  <text x="288" y="335" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Use for: executive coaching, identity coaching, L7</text>
  <line x1="288" y1="342" x2="514" y2="342" stroke="#E5E7EB" stroke-width="1"/>
  <text x="288" y="354" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" font-weight="700" fill="#DC2626">CIGAR: simplified — for L3 and brief line mgr coaching</text>

  <!-- Session logs + Level standards -->
  <rect x="540" y="150" width="232" height="208" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="540" y="150" width="232" height="22" rx="6" fill="#7C3AED"/>
  <rect x="540" y="162" width="232" height="10" fill="#7C3AED"/>
  <text x="656" y="167" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">SESSION LOGS + LEVEL STANDARDS</text>
  <text x="552" y="185" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Session log structure:</text>
  <text x="552" y="198" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Date · Duration · Coachee context (anonymised)</text>
  <text x="552" y="211" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Session objective · Model used + rationale</text>
  <text x="552" y="224" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Summary by model stage · Coachee commitments</text>
  <text x="552" y="237" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" font-weight="700" fill="#DC2626">Reflective notes = WHERE DISTINCTION CRITERIA ARE</text>
  <line x1="552" y1="244" x2="762" y2="244" stroke="#E5E7EB" stroke-width="1"/>
  <text x="552" y="256" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Sessions by level:</text>
  <text x="552" y="269" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Level 3: 2–3 logs · GROW or CIGAR</text>
  <text x="552" y="282" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Level 5: 4–6 logs · 2–3 coachees · GROW + OSCAR/CLEAR</text>
  <text x="552" y="295" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Level 7: 6+ logs · senior leader coachee required</text>
  <text x="552" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">L7: supervision evidence · EMCC or ICF eval.</text>
  <line x1="552" y1="315" x2="762" y2="315" stroke="#E5E7EB" stroke-width="1"/>
  <text x="552" y="327" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">EMCC 8 competencies:</text>
  <text x="552" y="340" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Self-management · Coaching presence</text>
  <text x="552" y="353" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#374151">Active listening · Fostering insight</text>

  <!-- Coaching philosophy + pass fail example -->
  <rect x="28" y="372" width="744" height="90" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="44" y="390" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#1D4ED8">COACHING PHILOSOPHY STATEMENT (Level 5 and Level 7) — 800–1,200 words</text>
  <text x="44" y="406" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Components: beliefs about how people change · coaching values (non-directiveness, autonomy) · how models are applied · quality of coaching relationship · how philosophy has developed through practice</text>
  <text x="44" y="421" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#DC2626">Pass: "I believe coaching should be non-directive and I use GROW because it provides a structured framework for the coaching conversation."</text>
  <text x="44" y="436" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#7C3AED">Distinction: "In session 4 with Coachee B, I noticed my premature move to Options before Reality was sufficiently explored — this challenged my assumption that GROW's linear structure provides adequate space for complexity, leading me to pilot CLEAR in session 5..."</text>
  <text x="44" y="451" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Tested by real experience · Critical of current approach · Forward-looking development intention — not aspirational principles without evidence connection</text>

  <!-- Level 3 to 7 progression strip -->
  <rect x="28" y="476" width="744" height="40" rx="6" fill="#1B3A6B"/>
  <text x="400" y="491" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">LEVEL PROGRESSION: L3 = "I applied GROW, here is what happened" · L5 = critical case study + philosophy statement + model comparison · L7 = EMCC/ICF eval + supervision + peer-reviewed research</text>
  <text x="400" y="507" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#A8C4E0">Progression measured by sophistication of reflective practice and critical evaluation standard — not just number of sessions · Coaching session citation: coachees anonymised in all submissions</text>

  <!-- Footer -->
  <text x="400" y="630" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#9CA3AF">ILM Assignment Help Service · ILM Coaching and Mentoring Models Framework — Levels 3, 5 and 7</text>
</svg>
